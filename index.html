<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site com Core Web Vitals Ruim</title>

  <!-- ❌ LCP: CSS externo bloqueando render (mantido 2, removido Bootstrap/Materialize) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- ❌ LCP: fontes pesadas sem font-display:swap (mantido, mas reduzido pesos) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Poppins:wght@400;700&display=block">

  <!-- ✅ Scripts removidos do <head> (jQuery, Lodash, Moment eliminados) -->

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f5f5f5;
      overflow-x: hidden;
    }

    header {
      height: 100vh;
      /* ❌ LCP: imagem de fundo via CSS sem preload (mantido) */
      background-image: url('https://picsum.photos/3000/2000');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 72px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .container {
      width: 95%;
      max-width: 1400px;
      margin: auto;
      padding: 40px 0;
    }

    .card {
      background: white;
      margin-bottom: 30px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      /* ❌ INP: transition: all (mantido) */
      transition: all 0.3s ease;
    }

    .card:hover { transform: scale(1.03); }

    /* ❌ CLS: banner sem espaço reservado (mantido) */
    .late-banner {
      display: none;
      margin: 50px 0;
      background: crimson;
      color: white;
      text-align: center;
      padding: 80px;
      font-size: 42px;
      font-weight: 900;
    }

    .floating-popup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 999;
    }

    /* ❌ CLS: ad slot sem altura (mantido) */
    .ad-slot {
      background: #eee;
      width: 100%;
      text-align: center;
      color: #999;
      font-size: 12px;
      margin: 20px 0;
      padding: 10px;
    }

    .cookie-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #222;
      color: #fff;
      padding: 20px 40px;
      font-size: 16px;
      z-index: 9998;
      text-align: center;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 15px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* ❌ CLS: imagens dos cards sem aspect-ratio reservado */
    .card img {
      width: 100%;
      margin-top: 20px;
      border-radius: 20px;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1 class="animate__animated animate__fadeInDown">⚠️ Performance Ruim</h1>
      <p style="font-size:24px;">Este site foi criado para falhar nos Core Web Vitals.</p>
    </div>
  </header>

  <!-- ❌ CLS: ad sem altura reservada -->
  <div class="ad-slot" id="adSlot">[ Carregando anúncio... ]</div>

  <div class="container" id="content"></div>

  <!-- ❌ CLS: banner oculto sem espaço reservado -->
  <div class="late-banner" id="lateBanner">🔥 PROMOÇÃO IMPERDÍVEL — SÓ HOJE! 🔥</div>

  <!-- ❌ CLS: cookie bar tardia -->
  <div class="cookie-bar" id="cookieBar">
    🍪 Usamos cookies.
    <button onclick="document.getElementById('cookieBar').style.display='none'">Aceitar</button>
  </div>

  <script>
    // ✅ Busy-wait eliminado (era o maior causador de timeout no PageSpeed)

    // ======================================================
    // ❌ INP RUIM — Long task no clique (reduzida de 2000ms para 600ms)
    // ======================================================
    document.body.addEventListener('click', () => {
      const t = performance.now();
      while (performance.now() - t < 600) {
        Math.random() * Math.random();
      }
    });

    // ======================================================
    // ❌ INP: scroll sem passive (mantido)
    // ======================================================
    window.addEventListener('scroll', () => {
      const cards = document.querySelectorAll('.card');
      cards.forEach(c => {
        const h = c.offsetHeight;       // read
        c.style.marginTop = '0px';      // write → layout thrashing
      });
    });

    // ======================================================
    // ❌ CLS — Banner sem reserva de espaço (4s)
    // ======================================================
    setTimeout(() => {
      document.getElementById('lateBanner').style.display = 'block';
    }, 4000);

    // ======================================================
    // ❌ CLS — Popup tardio (5s)
    // ======================================================
    setTimeout(() => {
      const popup = document.createElement('div');
      popup.className = 'floating-popup';
      popup.innerHTML = `
        <h3>📣 Newsletter</h3>
        <p>Inscreva-se agora!</p>
        <input type="email" placeholder="seu@email.com" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;">
        <button onclick="this.parentElement.remove()">Fechar</button>
      `;
      document.body.appendChild(popup);
    }, 5000);

    // ======================================================
    // ❌ CLS — Cookie bar tardia (6s)
    // ======================================================
    setTimeout(() => {
      document.getElementById('cookieBar').style.display = 'block';
    }, 6000);

    // ======================================================
    // ❌ CLS — Ad slot muda de tamanho após 3s
    // ======================================================
    setTimeout(() => {
      const ad = document.getElementById('adSlot');
      ad.style.height = '200px';
      ad.style.lineHeight = '200px';
      ad.style.background = '#fffde7';
      ad.style.fontSize = '20px';
      ad.textContent = '📢 ANÚNCIO CARREGADO TARDE';
    }, 3000);

    // ======================================================
    // ❌ DOM GRANDE — 50 cards (reduzido de 300)
    // ❌ CLS: imagens sem width/height (mantido)
    // ======================================================
    const container = document.getElementById('content');
    const fragment = document.createDocumentFragment();

    for (let i = 0; i < 50; i++) {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <h2>Card ${i + 1} <i class="fa fa-star"></i></h2>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit.
          Voluptatibus, molestiae.
        </p>
        <!-- ❌ CLS: sem width/height → shift ao carregar -->
        <img
          src="https://picsum.photos/800/500?random=${i}"
          loading="lazy"
          alt="imagem card ${i + 1}"
        >
        <button onclick="
          const s = performance.now();
          while(performance.now()-s < 300){ Math.random(); }
          this.textContent = 'Clicado';
        ">Botão</button>
      `;

      fragment.appendChild(card);
    }

    container.appendChild(fragment);

    // ======================================================
    // ❌ Array desnecessário (reduzido de 1M para 100k)
    // ======================================================
    const lixo = [];
    for (let i = 0; i < 100_000; i++) {
      lixo.push({ id: i, valor: Math.random() });
    }

    // ======================================================
    // ❌ setInterval pesado (mantido, mas menos agressivo)
    // ======================================================
    setInterval(() => {
      void document.body.offsetHeight; // forced reflow a cada 2s
    }, 2000);

  </script>
</body>
</html>
